<!DOCTYPE html>
<html>
<head>
<link rel=stylesheet type="text/css" href="/house.css" title="House">
<link rel=stylesheet type="text/css" href="/dcc/housedcc.css" title="House">
<script>

var DccKnownConfig = 0;

var index2Function = ["fl", "f1", "f2", "f3", "f4", "f5", "f6", "f7", "f8", "f9", "f10", "f11", "f12"];

function getTag (category, name) {
   return category + name.replace (/ /g,'-');
}

function newAction (text, command, id) {
    var button = document.createElement("button");
    button.innerHTML = text;
    button.type = 'button';
    button.disabled = false;
    button.resourceId = id;
    button.onclick = command;
    return button;
}

function dccSortModels (a, b) {
    return a.name < b.name;
}

function dccShowGpio (gpio) {
    document.getElementById ('gpioa').value = gpio[0];
    document.getElementById ('gpiob').value = gpio[1];
}

function dccShowModels (models) {

    var table = document.getElementById ('modellist');
    for (var i = table.rows.length - 1; i > 1; --i) {
       table.deleteRow(i);
    }

    var sorted = models.sort(dccSortModels);
    for (var i = sorted.length - 1; i >= 0; --i) {
        var model = sorted[i];

        var row = document.createElement("tr");
        row.id = getTag ('model', model.name);

        var column = document.createElement("td");
        column.innerHTML = model.name;
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = model.scale;
        row.appendChild(column);

        column = document.createElement("td");
        var x = new Array();
        if (model.devices) {
            for (var j = model.devices.length - 1; j >= 0; --j) {
                x[model.devices[j].index] = model.devices[j].name;
            }
        }
        if (x[13]) x[0] = x[13]; // Compatibility with FL = 13.
        for (var j = 0; j < index2Function.length; ++j) {
            if (x[j]) {
                var item = document.createElement("div");
                item.width = '100%';
                item.innerHTML = index2Function[j].toUpperCase()+': '+x[j];
                column.appendChild(item);
            }
        }
        row.appendChild(column);

        column = document.createElement("td");
        if (model.speeds) {
            for (var j = 0; j <= 12; ++j) {
                if (!model.speeds[j]) continue;
                var item = document.createElement("div");
                item.width = '100%';
                item.innerHTML = ''+(j+1)+': '+model.speeds[j];
                column.appendChild(item);
            }
        }
        row.appendChild(column);

        column = document.createElement("td");
        column.appendChild (newAction ("Delete", deleteVehicle, model.name));
        row.appendChild(column);

        table.appendChild(row);
    }
}

function dccSortVehicle (a, b) {
    return a.id < b.id;
}

function dccShowVehicles (vehicles) {
    var table = document.getElementById ('vehiclelist');
    for (var i = table.rows.length - 1; i > 1; --i) {
       table.deleteRow(i);
    }

    var sorted = vehicles.sort(dccSortVehicle);
    for (var i = sorted.length - 1; i >= 0; --i) {
        var vehicle = sorted[i];

        var row = document.createElement("tr");
        row.id = getTag ('vehicle', vehicle.id);

        var column = document.createElement("td");
        column.innerHTML = vehicle.id;
        column.id = row.id + '--id';
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = vehicle.address;
        row.appendChild(column);

        column = document.createElement("td");
        column.innerHTML = vehicle.model?vehicle.model:'';
        row.appendChild(column);

        column = document.createElement("td");
        column.appendChild (newAction ("Delete", deleteVehicle, vehicle.id));
        row.appendChild(column);

        table.appendChild(row);
    }
}

function dccShow (response) {
    dccShowGpio (response.trains.gpio);
    dccShowModels (response.trains.models);
    dccShowVehicles (response.trains.vehicles);
    DccKnownConfig = response.latest;
    if (!DccKnownConfig) DccKnownConfig = response.trains.latest;
}

function dccCommand (url) {
    var command = new XMLHttpRequest();
    command.open("GET", url);
    command.onreadystatechange = function () {
        if (command.readyState === 4) {
            if (command.status === 200) {
                var response = JSON.parse(command.responseText);
                dccShow(response);
            } else if (command.status === 404) {
                alert (command.statusText);
            }
        }
    }
    command.send(null);
}

function saveGpio () {
    var data = document.getElementById ('gpioa').value;
    if (!data) return;
    var url = "/dcc/gpio?a=" + data;
    data = document.getElementById ('gpiob').value;
    if (data) url += '&b=' + data;
    dccCommand (url);
}

function addModel () {
    var data = document.getElementById ('newname').value;
    if (!data) return;
    var url = "/dcc/fleet/vehicle/model?model=" + data;

    var data = document.getElementById ('newscale').value;
    if (data) url += '&scale=' + data;

    var functions = '';
    for (var i = 0; i < index2Function.length; ++i) {
       data = document.getElementById ('new'+index2Function[i]).value;
       if (data) functions += '+'+data+':'+i;
    }
    if (functions.length > 1) url += '&devices=' + functions.slice (1);

    var speeds = '';
    var last;
    for (last = 28; last >= 1; --last) {
      var element = document.getElementById ('newspeed'+last);
      if (element) if (element.value != 0) break;
    }
    for (var i = 1; i <= last; ++i) {
       speeds += '+'+document.getElementById ('newspeed'+i).value;
    }
    if (speeds.length > 1) url += '&speeds=' + speeds.slice (1);

    dccCommand (url);
}

function addVehicle () {
    var id = document.getElementById ('newid').value;
    if (!id) return;
    var adr = document.getElementById ('newadr').value;
    if (!adr) return;
    var url = "/dcc/fleet/vehicle/add?id=" + id + "&adr=" + adr;
    var model = document.getElementById ('newmodel').value;
    if (model) url += '&model=' + model;
    dccCommand (url);
}

// deleteVehicle is also used to delete a model, the ID will sort it out.
function deleteVehicle () {
    dccCommand ("/dcc/fleet/vehicle/delete?id="+this.resourceId);
}

function dccConfig (reset) {
    var command = new XMLHttpRequest();
    var url = "/dcc/fleet/config";
    if ((!reset) && DccKnownConfig) url += "?known=" + DccKnownConfig;
    command.open("GET", url);
    command.onreadystatechange = function () {
        if (command.readyState === 4 && command.status === 200) {
            var response = JSON.parse(command.responseText);
            dccShow(response);
        }
    }
    command.send(null);
}

window.onload = function() {
   dccConfig();
   setInterval (dccConfig, 5000);
};
</script>
<head>
   <title>DCC Config</title>
</head>
<body>
   <header>
   <table>
   <tr>
   <td><a href="/dcc/index.html">Dashboard</a></td>
   <td><a href="/dcc/events.html">Events</a></td>
   <td><span>Config</span></td>
   <td><a href="/dcc/capture.html">Capture</a></td>
   </tr>
   </table>
   </header>
   <section>
   <h1>DCC GPIO Pins</h1>
   <table id="gpiolist" class="housewidetable" border="0">
      <tr>
         <th width="10%">PIN +</th>
         <th width="10%">PIN -</th>
         <th width="80%"></th>
      </tr>
      <tr>
         <td><input type="number" id="gpioa" min="1" max="27"></td>
         <td><input type="number" id="gpiob" min="1" max="27"></td>
         <td><button type="button" onclick="saveGpio()">Save</td>
      </tr>
   </table>
   <br>
   <h1>Vehicle Models</h1>
   <table id="modellist">
      <tr>
         <th width="10%">NAME</th>
         <th width="4%">SCALE</th>
         <th width="15%">FUNCTIONS</th>
         <th width="15%">SPEED STEPS</th>
         <th width="56%"></th>
      </tr>
      <tr>
         <td><input type="text" id="newname"></td>
         <td><input type="text" id="newscale"></td>
         <td><div class="featuregrid">
         <div>FL:</div><input type="text" id="newfl">
         <div>F1:</div><input type="text" id="newf1">
         <div>F2:</div><input type="text" id="newf2">
         <div>F3:</div><input type="text" id="newf3">
         <div>F4:</div><input type="text" id="newf4">
         <div>F5:</div><input type="text" id="newf5">
         <div>F6:</div><input type="text" id="newf6">
         <div>F7:</div><input type="text" id="newf7">
         <div>F8:</div><input type="text" id="newf8">
         <div>F9:</div><input type="text" id="newf9">
         <div>F10:</div><input type="text" id="newf10">
         <div>F11:</div><input type="text" id="newf11">
         <div>F12:</div><input type="text" id="newf12">
         </div></td>
         <td><div class="featuregrid">
         <div>1:</div><input type="number" id="newspeed1">
         <div>2:</div><input type="number" id="newspeed2">
         <div>3:</div><input type="number" id="newspeed3">
         <div>4:</div><input type="number" id="newspeed4">
         <div>5:</div><input type="number" id="newspeed5">
         <div>6:</div><input type="number" id="newspeed6">
         <div>7:</div><input type="number" id="newspeed7">
         <div>8:</div><input type="number" id="newspeed8">
         <div>9:</div><input type="number" id="newspeed9">
         <div>10:</div><input type="number" id="newspeed10">
         <div>11:</div><input type="number" id="newspeed11">
         <div>12:</div><input type="number" id="newspeed12">
         <div>13:</div><input type="number" id="newspeed13">
         </div></td>
         <td style="vertical-align: top;"><button type="button" onclick="addModel()">Add</button></td>
      </tr>
   </table>
   <br>
   <h1>Vehicles</h1>
   <table id="vehiclelist" class="housewidetable" border="0">
      <tr>
         <th width="10%">ID</th>
         <th width="10%">ADDRESS</th>
         <th width="10%">MODEL</th>
         <th width="5%"></th>
         <th width="65%"></th>
      </tr>
      <tr>
         <td><input type="text" id="newid"></td>
         <td><input type="number" id="newadr"></td>
         <td><input type="text" id="newmodel"></td>
         <td><button type="button" onclick="addVehicle()">Add</button></td>
      </tr>
   </table>
   </section>
</body>
</html>
